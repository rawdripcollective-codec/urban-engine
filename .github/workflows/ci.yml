name: Static / HTML CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-html:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install validators
        run: npm install -g html-validate markdownlint-cli2

      - name: Validate HTML files
        run: |
          find . -name "*.html" -not -path "*/node_modules/*" -not -path "*/\.*" | while read -r file; do
            echo "Validating $file..."
            npx html-validate "$file" || true
          done

      - name: Lint Markdown
        run: |
          find . -name "*.md" -not -path "*/node_modules/*" -not -path "*/\.*" | head -20 | xargs markdownlint-cli2 || true

  link-check:
    name: Link Checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check links in HTML files
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --verbose
            --no-progress
            --accept 200,204,206,429
            --exclude "localhost"
            --exclude "127.0.0.1"
            --exclude "example.com"
            "**/*.html"
            "**/*.md"
          fail: false

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install http-server and lighthouse
        run: npm install -g http-server @lhci/cli

      - name: Start local server
        run: |
          http-server . -p 8080 &
          sleep 2

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.url=http://localhost:8080 \
            --collect.numberOfRuns=1 \
            --assert.preset=lighthouse:no-pwa \
            --upload.target=temporary-public-storage \
            || true

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [validate-html]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
